<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar & Notes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .viewer-container { max-width: 900px; margin: 0 auto; }

        .markdown-content h1 {
            border-bottom: 3px solid var(--pico-primary);
            padding-bottom: 0.5rem;
        }

        .markdown-content h2 {
            color: var(--pico-primary);
            border-bottom: 1px solid var(--pico-muted-border-color);
            padding-bottom: 0.4rem;
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--pico-primary);
        }

        .loading { text-align: center; padding: 2rem; color: var(--pico-muted-color); }
        .error { text-align: center; padding: 2rem; color: var(--pico-del-color); }
    </style>
</head>
<body>
    <nav class="top-nav">
        <ul>
            <li><a href="index.html" class="brand">German Course</a></li>
        </ul>
        <ul>
            <li><a href="flashcards.html">Flashcards</a></li>
            <li><a href="vocabulary.html">Vocabulary</a></li>
            <li><a href="markdown-viewer.html?file=grammar/1.md" aria-current="page">Grammar</a></li>
            <li><button class="dark-toggle" onclick="toggleDarkMode()">🌙</button></li>
        </ul>
    </nav>

    <main class="container viewer-container">
        <h1>Grammar & Notes</h1>

        <label>
            Select file:
            <select id="fileSelect">
                <option value="">Select a markdown file...</option>
                <option value="grammar/1.md">Grammar: Pronunciation rules</option>
                <option value="other/1. German Alphabet Pronunciation Guide.md">German Alphabet Pronunciation Guide</option>
                <option value="other/2. German Pronunciation rules.md">German Pronunciation rules</option>
                <option value="other/3. Personal Pronouns (Nominativ Only).md">Personal Pronouns (Nominativ)</option>
                <option value="other/4. personal pronomen with sein haben.md">Personal pronomen with sein/haben</option>
                <option value="other/5. Verb conjugation.md">Verb conjugation</option>
                <option value="other/6. Ja-Nein Fragen.md">Ja-Nein Fragen</option>
                <option value="other/7. Modal Verb.md">Modal Verb</option>
                <option value="other/8. Akkusative and Dativ.md">Akkusative and Dativ</option>
            </select>
        </label>

        <article id="markdownContainer">
            <div class="loading">Select a file to view...</div>
        </article>
    </main>

    <script>
        const fileSelect = document.getElementById('fileSelect');
        const markdownContainer = document.getElementById('markdownContainer');

        marked.setOptions({ breaks: true, gfm: true, headerIds: true, mangle: false });

        async function loadMarkdown(filePath) {
            if (!filePath) { markdownContainer.innerHTML = '<div class="loading">Select a file to view...</div>'; return; }
            markdownContainer.innerHTML = '<div class="loading" aria-busy="true">Loading...</div>';
            try {
                const r = await fetch(filePath);
                if (!r.ok) throw new Error(`File not found: ${filePath}`);
                markdownContainer.innerHTML = `<div class="markdown-content">${marked.parse(await r.text())}</div>`;
            } catch (e) {
                markdownContainer.innerHTML = `<div class="error">${e.message}</div>`;
            }
        }

        fileSelect.addEventListener('change', e => loadMarkdown(e.target.value));
        const fp = new URLSearchParams(location.search).get('file');
        if (fp) { fileSelect.value = fp; loadMarkdown(fp); }
    </script>
</body>
</html>
