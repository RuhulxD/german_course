# Deploys the Expo web static export (apps/german-app/dist) to the gh-pages branch.
# GitHub Pages: Settings → Pages → Build and deployment → Branch gh-pages / (root).
name: Deploy Expo web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/german-app/**'
      - 'lws/**'
      - 'grammar/**'
      - 'other/**'
      - '.github/workflows/deploy-expo-web.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/german-app/package-lock.json

      - name: Install and export
        working-directory: apps/german-app
        run: npm ci && npm run export:web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/german-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
