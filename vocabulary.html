<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Vocabulary</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <script src="config.js"></script>
    <style>
        .vocab-container { max-width: 1400px; margin: 0 auto; }

        .search-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0;
        }

        .search-row input { margin-bottom: 0; }
        .search-row button { margin-bottom: 0; white-space: nowrap; width: auto; }

        .search-info {
            font-size: 0.85rem;
            color: var(--pico-muted-color);
            margin-top: 0.5rem;
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { min-width: 750px; }

        .word-cell { font-weight: bold; }
        .pronunciation-cell { font-style: italic; color: var(--pico-muted-color); }
        .meaning-cell { color: var(--pico-primary); }
        .sentence-cell { font-size: 0.9em; font-style: italic; color: var(--pico-muted-color); }

        .action-links {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        .action-links a {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: var(--pico-border-radius);
            background: var(--pico-primary);
            color: var(--pico-primary-inverse);
            text-decoration: none;
            white-space: nowrap;
            font-weight: bold;
        }

        .action-links a:hover { opacity: 0.85; }
        .action-links a.secondary { background: var(--pico-secondary); color: var(--pico-secondary-inverse); }
        .action-links a.contrast { background: var(--pico-contrast); color: var(--pico-contrast-inverse); }

        .page-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .page-nav button { margin-bottom: 0; width: auto; }
        .page-nav span { font-weight: bold; }

        mark { padding: 1px 3px; }

        .loading, .error { text-align: center; padding: 2rem; color: var(--pico-muted-color); }
        .error { color: var(--pico-del-color); }

        @media (max-width: 576px) {
            .search-row { flex-direction: column; }
            .search-row button { width: 100%; }
            table { min-width: 550px; font-size: 0.8rem; }
            .action-links { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <ul>
            <li><a href="index.html" class="brand">German Course</a></li>
        </ul>
        <ul>
            <li><a href="flashcards.html">Flashcards</a></li>
            <li><a href="vocabulary.html" aria-current="page">Vocabulary</a></li>
            <li><a href="markdown-viewer.html?file=grammar/1.md">Grammar</a></li>
            <li><button class="dark-toggle" onclick="toggleDarkMode()">🌙</button></li>
        </ul>
    </nav>

    <main class="container vocab-container">
        <h1>German Vocabulary</h1>

        <!-- Search -->
        <article>
            <div class="search-row">
                <input type="search" id="searchInput" placeholder="Search all vocabulary (German, Bangla, or English)..." />
                <button onclick="searchVocabulary()">Search</button>
            </div>
            <div class="search-info" id="searchInfo"></div>
        </article>

        <!-- Page selector -->
        <div class="grid">
            <label>
                Page:
                <select id="pageSelect">
                    <option value="">Select a page...</option>
                </select>
            </label>
        </div>

        <!-- Table -->
        <div class="table-scroll" id="tableWrapper">
            <div class="loading">Select a page to view vocabulary...</div>
        </div>

        <!-- Page nav -->
        <div class="page-nav hidden" id="pageNav">
            <button class="outline" id="prevBtn">Prev</button>
            <span id="pageLabel">Page 1 of 56</span>
            <button class="outline" id="nextBtn">Next</button>
        </div>
    </main>

    <script>
        const pageSelect = document.getElementById('pageSelect');
        const tableWrapper = document.getElementById('tableWrapper');
        const pageNav = document.getElementById('pageNav');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageLabel = document.getElementById('pageLabel');
        const searchInput = document.getElementById('searchInput');

        function generatePageOptions() {
            pageSelect.innerHTML = '<option value="">Select a page...</option>';
            books.forEach(book => {
                const group = document.createElement('optgroup');
                group.label = book.name;
                book.pages.forEach(p => {
                    const option = document.createElement('option');
                    option.value = `${book.folder}/${p}`;
                    option.textContent = `Page ${p}`;
                    group.appendChild(option);
                });
                pageSelect.appendChild(group);
            });
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function highlight(text, q) {
            if (!q) return escapeHtml(text);
            const e = escapeHtml(text);
            return e.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
        }

        function createTable(data, query) {
            if (!data.length) { tableWrapper.innerHTML = '<div class="error">No data found.</div>'; return; }

            const headers = Object.keys(data[0]);
            let html = '<table role="grid"><thead><tr>';
            headers.forEach(h => { html += `<th>${h}</th>`; });
            html += '<th>Actions</th></tr></thead><tbody>';

            data.forEach(row => {
                html += '<tr>';
                const word = row[headers[0]] || '';
                const clean = word.replace(/^(der|die|das)\s+/i, '').trim();

                headers.forEach((h, i) => {
                    const val = row[h] || '';
                    let cls = '';
                    if (i === 0) cls = 'word-cell';
                    else if (i === 1) cls = 'pronunciation-cell';
                    else if (i === 2 || i === 3) cls = 'meaning-cell';
                    else if (i === 4) cls = 'sentence-cell';
                    html += `<td class="${cls}">${query ? highlight(val, query) : escapeHtml(val)}</td>`;
                });

                if (clean) {
                    const enc = encodeURIComponent(clean);
                    html += `<td><div class="action-links">
                        <a href="https://translate.google.com/?sl=de&tl=bn&text=${enc}" target="_blank">Translate</a>
                        <a href="https://www.dict.cc/?s=${enc}" target="_blank" class="secondary">Dict.cc</a>
                        <a href="https://en.wiktionary.org/wiki/${enc}#German" target="_blank" class="contrast">Wiktionary</a>
                    </div></td>`;
                } else html += '<td></td>';
                html += '</tr>';
            });

            html += '</tbody></table>';
            tableWrapper.innerHTML = html;
        }

        function updatePageNav(pagePath) {
            const idx = allPages.indexOf(pagePath);
            if (idx === -1) { pageNav.classList.add('hidden'); return; }
            pageNav.classList.remove('hidden');
            const parts = pagePath.split('/');
            const bookName = books.find(b => b.folder === parts[0])?.name || parts[0];
            pageLabel.textContent = `${bookName} — Page ${parts[1]} (${idx + 1} of ${allPages.length})`;
            prevBtn.disabled = idx <= 0;
            nextBtn.disabled = idx >= allPages.length - 1;
        }

        async function loadCSV(pagePath) {
            if (!pagePath) { tableWrapper.innerHTML = '<div class="loading">Select a page to view vocabulary...</div>'; pageNav.classList.add('hidden'); return; }
            document.getElementById('searchInfo').textContent = '';
            tableWrapper.innerHTML = '<div class="loading" aria-busy="true">Loading...</div>';
            try {
                const r = await fetch(`lws/csv/${pagePath}.csv`);
                if (!r.ok) throw new Error(`Not found: lws/csv/${pagePath}.csv`);
                createTable(parseCSV(await r.text()));
                updatePageNav(pagePath);
            } catch (e) {
                tableWrapper.innerHTML = `<div class="error">${e.message}</div>`;
                pageNav.classList.add('hidden');
            }
        }

        async function searchVocabulary() {
            const q = searchInput.value.trim();
            if (!q) return;
            tableWrapper.innerHTML = '<div class="loading" aria-busy="true">Searching...</div>';
            pageNav.classList.add('hidden');

            const results = [];
            let total = 0;
            for (const p of allPages) {
                try {
                    const r = await fetch(`lws/csv/${p}.csv`);
                    if (r.ok) {
                        const data = parseCSV(await r.text());
                        total += data.length;
                        results.push(...data.filter(row => Object.values(row).some(v => v.toLowerCase().includes(q.toLowerCase()))));
                    }
                } catch (e) {}
            }

            document.getElementById('searchInfo').textContent = `Found ${results.length} results across ${total} words`;
            results.length ? createTable(results, q) : (tableWrapper.innerHTML = '<div class="loading">No results found.</div>');
        }

        searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchVocabulary(); });
        pageSelect.addEventListener('change', e => loadCSV(e.target.value));
        prevBtn.addEventListener('click', () => { const i = allPages.indexOf(pageSelect.value); if (i > 0) { pageSelect.value = allPages[i-1]; loadCSV(pageSelect.value); }});
        nextBtn.addEventListener('click', () => { const i = allPages.indexOf(pageSelect.value); if (i >= 0 && i < allPages.length-1) { pageSelect.value = allPages[i+1]; loadCSV(pageSelect.value); }});

        const urlParams = new URLSearchParams(location.search);
        const pp = urlParams.get('p');
        if (pp) { const path = pp.includes('/') ? pp : `book-1/${pp}`; setTimeout(() => { pageSelect.value = path; loadCSV(path); }, 100); }

        generatePageOptions();
    </script>
</body>
</html>
